<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9">
        <animate attributeName="stop-color" dur="2s" repeatCount="indefinite" values="#0ea5e9;#38bdf8;#0ea5e9"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" dur="2s" repeatCount="indefinite" values="#8b5cf6;#a78bfa;#8b5cf6"/>
      </stop>
    </linearGradient>
  </defs>

  <path stroke="url(#logoGrad)" stroke-width="9" stroke-linecap="round" fill="none">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M20 70 C35 20 65 80 80 30;
      M20 70 C50 35 50 65 80 30;
      M20 70 C35 20 65 80 80 30
    "/>
  </path>

  <circle cx="20" cy="70" r="5" fill="#0ea5e9">
    <animate attributeName="fill" dur="2s" repeatCount="indefinite" values="#0ea5e9;#38bdf8;#0ea5e9"/>
  </circle>
  <circle cx="80" cy="30" r="5" fill="#8b5cf6">
    <animate attributeName="fill" dur="2s" repeatCount="indefinite" values="#8b5cf6;#a78bfa;#8b5cf6"/>
  </circle>
</svg>
